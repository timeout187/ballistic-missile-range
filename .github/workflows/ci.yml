name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Byte-compile every module
        run: python -m py_compile sixdof/*.py analysis/*.py app.py

      - name: Physics smoke test (every preset, gravity-turn flight)
        run: |
          python -c "
          from sixdof.presets import PRESETS
          from sixdof.guidance import GuidanceProgram
          from sixdof.simulation import Simulation
          from analysis.metrics import compute_metrics

          # Sanity bounds per preset - these reflect the exact sheet data in
          # presets.txt (copied verbatim, not adjusted) run through correct
          # energy-conserving 6DOF physics. Scud-B and Al-Husayn/Nodong-B in
          # particular are marginal thrust-to-weight vehicles as sourced and
          # only reach short apogee/range - that is the real sheet data, not
          # a bug. Bounds have headroom for minor tuning, not exact values.
          BOUNDS = {
              'Germany - V2':       dict(apogee=(50, 200),   rng=(5, 60),     mach=(1, 10),  g=(0, 40)),
              'Russia - Scud-B':    dict(apogee=(0.2, 20),   rng=(2, 40),     mach=(0.3, 6), g=(0, 40)),
              'Iraq - Al-Husayn':   dict(apogee=(5, 100),    rng=(50, 400),   mach=(2, 15),  g=(0, 60)),
              'DPRK - Nodong-A':    dict(apogee=(150, 700),  rng=(50, 400),   mach=(3, 20),  g=(0, 60)),
              'DPRK - Nodong-A1':   dict(apogee=(200, 900),  rng=(50, 400),   mach=(3, 25),  g=(0, 60)),
              'DPRK - Nodong-B':    dict(apogee=(3, 60),     rng=(30, 300),   mach=(1, 12),  g=(0, 40)),
              'DPRK - TD-1':        dict(apogee=(100, 700),  rng=(500, 3000), mach=(5, 30),  g=(0, 60)),
              'DPRK - TD-2':        dict(apogee=(700, 3500), rng=(1000, 5000),mach=(8, 40),  g=(0, 60)),
          }

          for name, v in PRESETS.items():
              g = GuidanceProgram(launch_azimuth_deg=90, trajectory_type='gravity_turn')
              sim = Simulation(v, g, launch_lat_deg=35.0, launch_lon_deg=45.0, t_max=3600)
              res = sim.run()
              m = compute_metrics(res, v)
              print(f'{name}: apogee={m.apogee_km:.1f}km range={m.total_range_km:.1f}km '
                    f'max_mach={m.max_mach:.2f} max_g={m.max_accel_g:.1f} impacted={res.impacted}')

              assert res.impacted, f'{name}: did not reach impact within the time limit'
              b = BOUNDS[name]
              assert b['apogee'][0] < m.apogee_km < b['apogee'][1], f'{name}: apogee out of range: {m.apogee_km}'
              assert b['rng'][0] < m.total_range_km < b['rng'][1], f'{name}: downrange out of range: {m.total_range_km}'
              assert b['mach'][0] < m.max_mach < b['mach'][1], f'{name}: max Mach out of range: {m.max_mach}'
              assert b['g'][0] <= m.max_accel_g < b['g'][1], f'{name}: max axial load out of range: {m.max_accel_g}'
          print('OK: physics smoke test passed for all presets')
          "

      - name: Verify every preset can be constructed and at least attempts liftoff
        run: |
          python -c "
          from sixdof.presets import PRESETS
          for name, v in PRESETS.items():
              assert v.stages, f'{name} has no stages'
              s0 = v.stages[0]
              tw = s0.thrust_vac / (v.total_mass() * 9.81)
              print(f'{name}: liftoff T/W = {tw:.2f}')
              assert tw > 1.0, f'{name} cannot lift off (T/W={tw:.2f})'
          print('OK: all presets are flyable')
          "
